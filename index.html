<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#000000">
  <meta name="description" content="Single-file playable runner built with Pixi.js.">
  <title>Playable Runner</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      touch-action: none;
      -webkit-tap-highlight-color: transparent;
    }
    #viewport-shell {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #game {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }
    body.debug-mode #viewport-shell {
      padding: 16px;
    }
    body.debug-mode.preset-active #viewport-shell {
      padding-bottom: 88px;
    }
    body.debug-mode.preset-active #game {
      border-radius: 28px;
      box-shadow: 0 24px 80px rgba(0,0,0,0.48);
    }
    #game canvas {
      display: block;
      width: 100% !important;
      height: 100% !important;
    }
    #viewport-debug {
      display: none;
      position: fixed;
      left: 12px;
      bottom: 12px;
      z-index: 20;
      flex-wrap: wrap;
      gap: 6px;
      max-width: min(92vw, 720px);
      padding: 10px;
      border-radius: 14px;
      background: rgba(12, 16, 24, 0.78);
      backdrop-filter: blur(10px);
      font: 12px/1.2 system-ui, sans-serif;
    }
    body.debug-mode #viewport-debug {
      display: flex;
    }
    #viewport-debug button {
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 999px;
      background: rgba(255,255,255,0.08);
      color: #fff;
      padding: 7px 10px;
      cursor: pointer;
    }
    #viewport-debug button.active {
      background: #dff266;
      color: #111;
      border-color: #dff266;
    }
  </style>
</head>
<body>
  <div id="viewport-shell">
    <div id="game"></div>
  </div>
  <div id="viewport-debug">
    <button data-preset="auto" class="active">Auto</button>
    <button data-preset="iphone14">iPhone 14</button>
    <button data-preset="iphone16">iPhone 16</button>
    <button data-preset="ipad">iPad</button>
    <button data-preset="ipadair">iPad Air</button>
    <button data-preset="laptop">Laptop</button>
    <button data-preset="desktop">Desktop</button>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
